name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (default: YYYY.MM.DD)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date -u +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag is available
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Pass a custom version or wait until tomorrow."
            exit 1
          fi

  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stamp version
        run: node -e "const p='apps/swarm/package.json';const j=JSON.parse(require('fs').readFileSync(p));j.version='${{ needs.prepare.outputs.version }}';require('fs').writeFileSync(p,JSON.stringify(j,null,2)+'\n')"

      - name: Build
        working-directory: apps/swarm
        run: bun run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: apps/swarm/release/**/*.dmg

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stamp version
        run: node -e "const p='apps/swarm/package.json';const j=JSON.parse(require('fs').readFileSync(p));j.version='${{ needs.prepare.outputs.version }}';require('fs').writeFileSync(p,JSON.stringify(j,null,2)+'\n')"

      - name: Build
        working-directory: apps/swarm
        run: bun run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: apps/swarm/release/**/*-Setup.exe

  release:
    needs: [prepare, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "v${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \) -exec \
          gh release create "v${{ needs.prepare.outputs.version }}" \
              --title "v${{ needs.prepare.outputs.version }}" \
              --generate-notes \
              {} +
