language: 'typescript'
layer: 'application'
stack: 'frontend'

workspace:
  inheritedTasks:
    exclude: ['lint', 'typecheck']

tasks:
  dev:
    command: 'bun run dev'
    inputs: []
    preset: 'server'

  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'content/**/*'
      - 'vite.config.ts'
      - 'source.config.ts'
      - 'tsconfig.json'
    outputs:
      - '.output'

  typecheck:
    command: 'bun run typecheck'
    inputs:
      - 'src/**/*'
      - 'content/**/*'
      - 'tsconfig.json'
