layer: 'configuration'

tasks:
  format:
    command: 'prettier --write .'
    inputs: []
    options:
      cache: false
      runFromWorkspaceRoot: true

  format-staged:
    command: 'prettier --write --ignore-unknown'
    inputs: []
    options:
      cache: false
      runFromWorkspaceRoot: true
      runInCI: false
